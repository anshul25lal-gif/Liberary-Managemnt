<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Manage Books', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-journals me-2 text-primary"></i>Manage Books</h4>
    <a th:href="@{/admin/books/new}" class="btn btn-primary">
        <i class="bi bi-plus-circle me-1"></i>Add New Book
    </a>
</div>

<!-- Search & Filter -->
<div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">
        <form th:action="@{/admin/books}" method="get" class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label small fw-medium">Search</label>
                <input type="text" name="search" th:value="${search}"
                       class="form-control" placeholder="Title, author, ISBN..." />
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-medium">Category</label>
                <select name="category" class="form-select">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                            th:selected="${cat == selectedCategory}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/admin/books}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-x-circle me-1"></i>Clear
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Books Table -->
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Category</th>
                        <th>Copies</th>
                        <th>Available</th>
                        <th>Shelf</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${books.isEmpty()}">
                        <td colspan="9" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>No books found.
                        </td>
                    </tr>
                    <tr th:each="book : ${books}">
                        <td class="ps-3 text-muted small" th:text="${book.id}"></td>
                        <td class="fw-medium" th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td class="font-monospace small" th:text="${book.isbn}"></td>
                        <td><span class="badge bg-secondary" th:text="${book.category}"></span></td>
                        <td th:text="${book.totalCopies}"></td>
                        <td>
                            <span th:if="${book.availableCopies > 0}" class="badge bg-success" th:text="${book.availableCopies}"></span>
                            <span th:if="${book.availableCopies == 0}" class="badge bg-danger">Out of Stock</span>
                        </td>
                        <td class="text-muted small" th:text="${book.shelfLocation ?: '—'}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/books/{id}/edit(id=${book.id})}"
                               class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    title="Delete"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#deleteModal',
                                             data-delete-url=@{/admin/books/{id}/delete(id=${book.id})},
                                             data-item-name=${book.title}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Pagination -->
    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center" th:if="${books.totalPages > 1}">
        <small class="text-muted">
            Showing page <span th:text="${currentPage + 1}"></span> of <span th:text="${books.totalPages}"></span>
            (<span th:text="${books.totalElements}"></span> books)
        </small>
        <nav>
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/books(search=${search},category=${selectedCategory},page=${currentPage - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, books.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/books(search=${search},category=${selectedCategory},page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == books.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/books(search=${search},category=${selectedCategory},page=${currentPage + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteItemName"></strong>? This action cannot be undone.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a href="#" id="deleteConfirmBtn" class="btn btn-danger">
                    <i class="bi bi-trash me-1"></i>Delete
                </a>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
