<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | LibraryMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body class="auth-page d-flex align-items-center min-vh-100 py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="text-center mb-4">
                <i class="bi bi-book-fill display-4 text-primary"></i>
                <h2 class="fw-bold text-primary mt-1">LibraryMS</h2>
                <p class="text-muted">Create your member account</p>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title fw-semibold mb-4 text-center">Member Registration</h5>

                    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${errorMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/register}" th:object="${registerDto}" method="post" novalidate>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Username <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}"
                                       class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Choose a username" />
                                <div class="invalid-feedback" th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Full Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}"
                                       class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Your full name" />
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Email Address <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}"
                                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="you@example.com" />
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Password <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{password}"
                                       class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Min 6 chars, 1 letter + 1 number" />
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Confirm Password <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{confirmPassword}"
                                       class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                       placeholder="Repeat password" />
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Phone</label>
                                <input type="tel" th:field="*{phone}"
                                       class="form-control" placeholder="Optional" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Address</label>
                                <input type="text" th:field="*{address}"
                                       class="form-control" placeholder="Optional" />
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg fw-semibold">
                                <i class="bi bi-person-check me-2"></i>Register
                            </button>
                        </div>
                    </form>

                    <hr class="my-3" />
                    <p class="text-center text-muted small mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-primary fw-medium">Sign in</a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
