<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Error', ~{::main})}">
<body>
<main>
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-4 d-block"></i>
        <h3 class="fw-bold" th:text="${errorTitle} ?: 'Something Went Wrong'"></h3>
        <p class="text-muted mb-4" th:text="${errorMessage} ?: 'An unexpected error occurred.'"></p>
        <a href="javascript:history.back()" class="btn btn-outline-secondary me-2">
            <i class="bi bi-arrow-left me-1"></i>Go Back
        </a>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-house me-1"></i>Home
        </a>
    </div>
</div>
</main>
</body>
</html>
