<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(${isEdit} ? 'Edit Book' : 'Add Book', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-book me-2 text-primary"></i>
        <span th:text="${isEdit} ? 'Edit Book' : 'Add New Book'"></span>
    </h4>
    <a th:href="@{/admin/books}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back to Books
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

                <div th:if="${errorMsg}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    <span th:text="${errorMsg}"></span>
                </div>

                <form th:action="${isEdit} ? @{/admin/books/{id}/edit(id=${bookId})} : @{/admin/books/new}"
                      th:object="${bookDto}" method="post" novalidate>

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-medium">Title <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{title}"
                                   class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                   placeholder="Book title" />
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Author <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{author}"
                                   class="form-control" th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'"
                                   placeholder="Author name" />
                            <div class="invalid-feedback" th:errors="*{author}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">ISBN <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{isbn}"
                                   class="form-control" th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'"
                                   placeholder="e.g. 978-0-306-40615-7" />
                            <div class="invalid-feedback" th:errors="*{isbn}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Category <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{category}" list="categoryList"
                                   class="form-control" th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                                   placeholder="e.g. Fiction, Science" />
                            <datalist id="categoryList">
                                <option th:each="cat : ${categories}" th:value="${cat}"></option>
                            </datalist>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Publisher</label>
                            <input type="text" th:field="*{publisher}"
                                   class="form-control" placeholder="Publisher name" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-medium">Publication Year</label>
                            <input type="number" th:field="*{publicationYear}"
                                   class="form-control" th:classappend="${#fields.hasErrors('publicationYear')} ? 'is-invalid'"
                                   placeholder="e.g. 2023" min="1000" max="2100" />
                            <div class="invalid-feedback" th:errors="*{publicationYear}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-medium">Total Copies <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{totalCopies}"
                                   class="form-control" th:classappend="${#fields.hasErrors('totalCopies')} ? 'is-invalid'"
                                   min="1" />
                            <div class="invalid-feedback" th:errors="*{totalCopies}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-medium">Available Copies <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{availableCopies}"
                                   class="form-control" th:classappend="${#fields.hasErrors('availableCopies')} ? 'is-invalid'"
                                   min="0" />
                            <div class="invalid-feedback" th:errors="*{availableCopies}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium">Shelf Location</label>
                            <input type="text" th:field="*{shelfLocation}"
                                   class="form-control" placeholder="e.g. A-101, Row 3" />
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>
                            <span th:text="${isEdit} ? 'Update Book' : 'Add Book'"></span>
                        </button>
                        <a th:href="@{/admin/books}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
