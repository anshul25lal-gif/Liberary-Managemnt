<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Book Catalog', ~{::main})}">
<body>
<main>

<style>
/* ── Book cover colors per category ─────────────────────────────────── */
.cover-fiction          { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.cover-mathematics      { background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%); }
.cover-computer-science { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
.cover-physics          { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
.cover-science          { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); }
.cover-history          { background: linear-gradient(135deg, #b79891 0%, #94716b 100%); }
.cover-biography        { background: linear-gradient(135deg, #e53935 0%, #e35d5b 100%); }
.cover-psychology       { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
.cover-business         { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
.cover-finance          { background: linear-gradient(135deg, #b8860b 0%, #ffd700 100%); }
.cover-management       { background: linear-gradient(135deg, #485563 0%, #29323c 100%); }
.cover-self-help        { background: linear-gradient(135deg, #56ccf2 0%, #2f80ed 100%); }
.cover-default          { background: linear-gradient(135deg, #868f96 0%, #596164 100%); }

.book-cover {
    height: 160px;
    border-radius: 8px 8px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
    overflow: hidden;
}
.book-cover::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px 0 0 0;
}
.book-cover-title {
    color: rgba(255,255,255,0.95);
    font-size: 0.78rem;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    max-height: 60px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    margin-top: 6px;
}
.book-cover-author {
    color: rgba(255,255,255,0.7);
    font-size: 0.68rem;
    text-align: center;
    margin-top: 4px;
}
.book-cover i {
    font-size: 1.8rem;
    color: rgba(255,255,255,0.5);
}
.book-card { transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; }
.book-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.15) !important; }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-search me-2 text-primary"></i>Book Catalog</h4>
    <span class="badge bg-primary rounded-pill fs-6" th:text="${books.totalElements} + ' books'"></span>
</div>

<!-- ── Search & Filter Form ──────────────────────────────────────────────── -->
<div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">
        <form th:action="@{/catalog}" method="get" id="filterForm">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-medium">Search</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" name="search" id="searchInput" th:value="${search}"
                               class="form-control border-start-0" placeholder="Title, author, ISBN..." />
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-medium">Category</label>
                    <select name="category" class="form-select" id="categorySelect">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="${cat}"
                                th:selected="${cat == selectedCategory}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium">Availability</label>
                    <select name="available" class="form-select" id="availableSelect">
                        <option value=""    th:selected="${available == '' or available == null}">All</option>
                        <option value="true"  th:selected="${available == 'true'}">Available</option>
                        <option value="false" th:selected="${available == 'false'}">Out of Stock</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium">Sort By</label>
                    <select name="sort" class="form-select" id="sortSelect">
                        <option value="title"     th:selected="${sort == 'title'}">Title (A–Z)</option>
                        <option value="author"    th:selected="${sort == 'author'}">Author (A–Z)</option>
                        <option value="category"  th:selected="${sort == 'category'}">Category</option>
                        <option value="createdAt" th:selected="${sort == 'createdAt'}">Newest First</option>
                    </select>
                </div>
                <div class="col-md-1 d-flex gap-1">
                    <button type="submit" class="btn btn-primary w-100" title="Apply Filters">
                        <i class="bi bi-funnel-fill"></i>
                    </button>
                </div>
            </div>
            <!-- Active filter chips -->
            <div class="mt-2 d-flex flex-wrap gap-1" id="filterChips">
                <span th:if="${search != ''}" class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill">
                    Search: <span th:text="${search}"></span>
                    <a th:href="@{/catalog(category=${selectedCategory},available=${available},sort=${sort})}" class="text-primary ms-1">×</a>
                </span>
                <span th:if="${selectedCategory != ''}" class="badge bg-success-subtle text-success border border-success-subtle rounded-pill">
                    Category: <span th:text="${selectedCategory}"></span>
                    <a th:href="@{/catalog(search=${search},available=${available},sort=${sort})}" class="text-success ms-1">×</a>
                </span>
                <span th:if="${available != ''}" class="badge bg-info-subtle text-info border border-info-subtle rounded-pill">
                    <span th:text="${available == 'true'} ? 'Available only' : 'Out of stock only'"></span>
                    <a th:href="@{/catalog(search=${search},category=${selectedCategory},sort=${sort})}" class="text-info ms-1">×</a>
                </span>
                <a th:if="${search != '' or selectedCategory != '' or available != ''}"
                   th:href="@{/catalog}" class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill text-decoration-none">
                    <i class="bi bi-x-circle me-1"></i>Clear all
                </a>
            </div>
        </form>
    </div>
</div>

<!-- ── Book Grid ─────────────────────────────────────────────────────────── -->
<div class="row g-3 mb-4">
    <div th:if="${books.isEmpty()}" class="col-12">
        <div class="text-center py-5 text-muted">
            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
            <h6>No books match your filters.</h6>
            <a th:href="@{/catalog}" class="btn btn-outline-primary btn-sm mt-2">Clear Filters</a>
        </div>
    </div>

    <div class="col-sm-6 col-lg-4 col-xl-3" th:each="book : ${books}">
        <div class="card h-100 border-0 shadow-sm rounded-4 book-card">

            <!-- Cover Image -->
            <div class="book-cover rounded-top-4"
                 th:classappend="${
                    book.category == 'Fiction'          ? 'cover-fiction'          :
                    book.category == 'Mathematics'      ? 'cover-mathematics'      :
                    book.category == 'Computer Science' ? 'cover-computer-science' :
                    book.category == 'Physics'          ? 'cover-physics'          :
                    book.category == 'Science'          ? 'cover-science'          :
                    book.category == 'History'          ? 'cover-history'          :
                    book.category == 'Biography'        ? 'cover-biography'        :
                    book.category == 'Psychology'       ? 'cover-psychology'       :
                    book.category == 'Business'         ? 'cover-business'         :
                    book.category == 'Finance'          ? 'cover-finance'          :
                    book.category == 'Management'       ? 'cover-management'       :
                    book.category == 'Self-Help'        ? 'cover-self-help'        :
                                                          'cover-default'}">
                <i th:classappend="${
                    book.category == 'Fiction'          ? 'bi bi-book'             :
                    book.category == 'Mathematics'      ? 'bi bi-calculator'       :
                    book.category == 'Computer Science' ? 'bi bi-laptop'           :
                    book.category == 'Physics'          ? 'bi bi-lightning'        :
                    book.category == 'Science'          ? 'bi bi-flask'            :
                    book.category == 'History'          ? 'bi bi-hourglass-split'  :
                    book.category == 'Biography'        ? 'bi bi-person-badge'     :
                    book.category == 'Psychology'       ? 'bi bi-brain'            :
                    book.category == 'Business'         ? 'bi bi-briefcase'        :
                    book.category == 'Finance'          ? 'bi bi-currency-dollar'  :
                    book.category == 'Management'       ? 'bi bi-diagram-3'        :
                    book.category == 'Self-Help'        ? 'bi bi-stars'            :
                                                          'bi bi-book-fill'}">
                </i>
                <div class="book-cover-title" th:text="${book.title}"></div>
                <div class="book-cover-author" th:text="${book.author}"></div>
            </div>

            <!-- Card body -->
            <div class="card-body p-3 pb-1">
                <span class="badge bg-secondary-subtle text-secondary rounded-pill mb-1 small" th:text="${book.category}"></span>
                <h6 class="fw-bold mb-1 lh-sm" style="font-size:0.85rem"
                    th:text="${book.title}" th:title="${book.title}"></h6>
                <p class="text-muted mb-1" style="font-size:0.78rem" th:text="${book.author}"></p>
                <p class="font-monospace text-muted mb-0" style="font-size:0.70rem"
                   th:text="'ISBN: ' + ${book.isbn}"></p>
            </div>

            <!-- Card footer -->
            <div class="card-footer bg-transparent border-0 pt-1 pb-3 px-3 d-flex justify-content-between align-items-center">
                <span th:if="${book.availableCopies > 0}" class="badge bg-success-subtle text-success rounded-pill">
                    <i class="bi bi-check-circle-fill me-1"></i>
                    <span th:text="${book.availableCopies}"></span> available
                </span>
                <span th:if="${book.availableCopies == 0}" class="badge bg-danger-subtle text-danger rounded-pill">
                    <i class="bi bi-x-circle-fill me-1"></i>Out of stock
                </span>
                <span th:if="${book.shelfLocation != null}" class="text-muted" style="font-size:0.72rem">
                    <i class="bi bi-geo-alt me-1"></i><span th:text="${book.shelfLocation}"></span>
                </span>
            </div>
        </div>
    </div>
</div>

<!-- ── Pagination ─────────────────────────────────────────────────────────── -->
<nav th:if="${books.totalPages > 1}">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link rounded-start-3"
               th:href="@{/catalog(search=${search},category=${selectedCategory},available=${available},sort=${sort},page=${currentPage - 1})}">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, books.totalPages - 1)}"
            th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/catalog(search=${search},category=${selectedCategory},available=${available},sort=${sort},page=${i})}"
               th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${currentPage == books.totalPages - 1} ? 'disabled'">
            <a class="page-link rounded-end-3"
               th:href="@{/catalog(search=${search},category=${selectedCategory},available=${available},sort=${sort},page=${currentPage + 1})}">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
    <p class="text-center text-muted small">
        Page <span th:text="${currentPage + 1}"></span> of <span th:text="${books.totalPages}"></span>
        &mdash; <span th:text="${books.totalElements}"></span> books total
    </p>
</nav>

</main>
</body>
</html>
