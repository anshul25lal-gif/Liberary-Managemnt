<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Member Detail', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Member Detail</h4>
    <a th:href="@{/admin/members}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back to Members
    </a>
</div>

<div class="row g-4">
    <!-- Member Info Card -->
    <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body text-center p-4">
                <div class="avatar-circle mx-auto mb-3">
                    <i class="bi bi-person-fill fs-1 text-primary"></i>
                </div>
                <h5 class="fw-bold" th:text="${member.fullName}"></h5>
                <p class="text-muted mb-1" th:text="'@' + ${member.username}"></p>
                <span th:if="${!member.blocked}" class="badge bg-success mb-3">Active</span>
                <span th:if="${member.blocked}" class="badge bg-danger mb-3">Blocked</span>
                <hr />
                <div class="text-start small">
                    <div class="mb-2"><i class="bi bi-envelope me-2 text-muted"></i><span th:text="${member.email}"></span></div>
                    <div class="mb-2"><i class="bi bi-telephone me-2 text-muted"></i><span th:text="${member.phone ?: 'N/A'}"></span></div>
                    <div class="mb-2"><i class="bi bi-geo-alt me-2 text-muted"></i><span th:text="${member.address ?: 'N/A'}"></span></div>
                    <div><i class="bi bi-calendar me-2 text-muted"></i>
                        <span th:text="${#temporals.format(member.createdAt, 'dd MMM yyyy')}"></span>
                    </div>
                </div>
                <hr />
                <div class="d-grid gap-2">
                    <a th:href="@{/admin/members/{id}/toggle-block(id=${member.id})}"
                       class="btn btn-sm"
                       th:classappend="${member.blocked} ? 'btn-outline-success' : 'btn-outline-warning'">
                        <i th:classappend="${member.blocked} ? 'bi bi-unlock me-1' : 'bi bi-lock me-1'"></i>
                        <span th:text="${member.blocked} ? 'Unblock Member' : 'Block Member'"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Transactions -->
    <div class="col-lg-8">
        <!-- Currently Borrowed -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-header bg-white border-0 pt-3">
                <h6 class="fw-semibold mb-0">
                    <i class="bi bi-bookmark-fill me-2 text-primary"></i>Currently Borrowed
                    <span class="badge bg-primary ms-1" th:text="${#lists.size(activeBooks)}"></span>
                </h6>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 small">
                        <thead class="table-light">
                            <tr><th class="ps-3">Book</th><th>Issue Date</th><th>Due Date</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(activeBooks)}">
                                <td colspan="4" class="text-center text-muted py-3">No active borrowings.</td>
                            </tr>
                            <tr th:each="t : ${activeBooks}">
                                <td class="ps-3 fw-medium" th:text="${t.book.title}"></td>
                                <td th:text="${t.issueDate}"></td>
                                <td th:classappend="${t.dueDate.isBefore(#dates.createToday().toInstant().atZone(T(java.time.ZoneId).systemDefault()).toLocalDate())} ? 'text-danger fw-bold'"
                                    th:text="${t.dueDate}"></td>
                                <td><span class="badge bg-primary">Issued</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Fine Summary -->
        <div class="card border-0 shadow-sm rounded-4 mb-4" th:if="${unpaidFine > 0}">
            <div class="card-body d-flex align-items-center gap-3 py-3">
                <i class="bi bi-exclamation-circle-fill fs-3 text-danger"></i>
                <div>
                    <div class="fw-semibold text-danger">Unpaid Fines</div>
                    <div class="fs-4 fw-bold">₹<span th:text="${#numbers.formatDecimal(unpaidFine, 1, 2)}"></span></div>
                </div>
            </div>
        </div>

        <!-- Borrowing History -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-3">
                <h6 class="fw-semibold mb-0"><i class="bi bi-clock-history me-2 text-secondary"></i>Borrowing History</h6>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 small">
                        <thead class="table-light">
                            <tr><th class="ps-3">Book</th><th>Issued</th><th>Due</th><th>Returned</th><th>Fine</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(allTransactions)}">
                                <td colspan="6" class="text-center text-muted py-3">No history.</td>
                            </tr>
                            <tr th:each="t : ${allTransactions}">
                                <td class="ps-3 fw-medium" th:text="${t.book.title}"></td>
                                <td th:text="${t.issueDate}"></td>
                                <td th:text="${t.dueDate}"></td>
                                <td th:text="${t.returnDate ?: '—'}"></td>
                                <td>
                                    <span th:if="${t.fineAmount > 0}" class="text-danger">₹<span th:text="${t.fineAmount}"></span></span>
                                    <span th:if="${t.fineAmount == 0}" class="text-muted">—</span>
                                </td>
                                <td>
                                    <span th:switch="${t.status.name()}">
                                        <span th:case="'ISSUED'" class="badge bg-primary">Issued</span>
                                        <span th:case="'RETURNED'" class="badge bg-success">Returned</span>
                                        <span th:case="'OVERDUE'" class="badge bg-danger">Overdue</span>
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
