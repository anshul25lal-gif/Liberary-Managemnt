<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('My Profile', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

                <!-- Avatar & basic info header -->
                <div class="text-center mb-4">
                    <div class="avatar-circle mx-auto mb-3">
                        <i class="bi bi-person-fill fs-1 text-primary"></i>
                    </div>
                    <h5 class="fw-bold mb-0" th:text="${user.fullName}"></h5>
                    <span class="text-muted small" th:text="'@' + ${user.username}"></span>
                    <span class="badge bg-info ms-2">Member</span>
                </div>

                <hr />

                <form th:action="@{/member/profile}" th:object="${user}" method="post" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Phone</label>
                            <input type="tel" th:field="*{phone}" class="form-control" placeholder="Optional" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Username</label>
                            <input type="text" th:value="${user.username}" class="form-control" disabled />
                            <div class="form-text">Username cannot be changed.</div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium">Address</label>
                            <input type="text" th:field="*{address}" class="form-control" placeholder="Optional" />
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Save Changes
                        </button>
                    </div>
                </form>

                <hr class="my-4" />

                <!-- Read-only account info -->
                <div class="small text-muted">
                    <div class="row g-2">
                        <div class="col-6">
                            <span class="fw-medium text-dark">Member Since:</span><br/>
                            <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}"></span>
                        </div>
                        <div class="col-6">
                            <span class="fw-medium text-dark">Account Status:</span><br/>
                            <span th:if="${!user.blocked}" class="text-success fw-medium">Active</span>
                            <span th:if="${user.blocked}" class="text-danger fw-medium">Blocked</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
