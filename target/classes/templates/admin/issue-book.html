<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Issue Book', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-arrow-up-circle me-2 text-primary"></i>Issue Book to Member</h4>
    <a th:href="@{/admin/transactions}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-list-check me-1"></i>View All Transactions
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

                <div th:if="${errorMsg}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    <span th:text="${errorMsg}"></span>
                </div>

                <!-- Business Rules Info -->
                <div class="alert alert-info border-0 rounded-3 mb-4">
                    <h6 class="alert-heading fw-semibold"><i class="bi bi-info-circle me-1"></i>Issuing Rules</h6>
                    <ul class="mb-0 small">
                        <li>Member must not be blocked</li>
                        <li>Member can hold a maximum of <strong>3 books</strong> at a time</li>
                        <li>Loan period: <strong>14 days</strong> from today</li>
                        <li>Fine: <strong>₹5 per day</strong> after due date</li>
                    </ul>
                </div>

                <form th:action="@{/admin/issue-book}" th:object="${issueDto}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Select Member <span class="text-danger">*</span></label>
                        <select th:field="*{userId}"
                                class="form-select" th:classappend="${#fields.hasErrors('userId')} ? 'is-invalid'">
                            <option value="">-- Choose a member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.id}"
                                    th:text="${m.fullName + ' (@' + m.username + ')' + (m.blocked ? ' [BLOCKED]' : '')}"
                                    th:disabled="${m.blocked}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{userId}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Select Book <span class="text-danger">*</span></label>
                        <select th:field="*{bookId}"
                                class="form-select" th:classappend="${#fields.hasErrors('bookId')} ? 'is-invalid'">
                            <option value="">-- Choose an available book --</option>
                            <option th:each="b : ${books}"
                                    th:value="${b.id}"
                                    th:text="${b.title + ' by ' + b.author + ' [' + b.availableCopies + ' available]'}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{bookId}"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-check-circle me-1"></i>Issue Book
                        </button>
                        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
