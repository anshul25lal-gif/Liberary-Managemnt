<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Manage Members', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-people-fill me-2 text-primary"></i>Manage Members</h4>
</div>

<!-- Search -->
<div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">
        <form th:action="@{/admin/members}" method="get" class="row g-2 align-items-end">
            <div class="col-md-8">
                <label class="form-label small fw-medium">Search Members</label>
                <input type="text" name="search" th:value="${search}"
                       class="form-control" placeholder="Name, username, or email..." />
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>Search</button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/admin/members}" class="btn btn-outline-secondary w-100"><i class="bi bi-x-circle me-1"></i>Clear</a>
            </div>
        </form>
    </div>
</div>

<!-- Members Table -->
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Full Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${members.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-people fs-1 d-block mb-2"></i>No members found.
                        </td>
                    </tr>
                    <tr th:each="member : ${members}">
                        <td class="ps-3 text-muted small" th:text="${member.id}"></td>
                        <td class="fw-medium" th:text="${member.fullName}"></td>
                        <td class="text-muted" th:text="${member.username}"></td>
                        <td th:text="${member.email}"></td>
                        <td th:text="${member.phone ?: '—'}"></td>
                        <td>
                            <span th:if="${!member.blocked}" class="badge bg-success">Active</span>
                            <span th:if="${member.blocked}" class="badge bg-danger">Blocked</span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(member.createdAt, 'dd MMM yyyy')}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/members/{id}(id=${member.id})}"
                               class="btn btn-sm btn-outline-info me-1" title="View">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/admin/members/{id}/toggle-block(id=${member.id})}"
                               class="btn btn-sm me-1"
                               th:classappend="${member.blocked} ? 'btn-outline-success' : 'btn-outline-warning'"
                               th:title="${member.blocked} ? 'Unblock' : 'Block'">
                                <i th:classappend="${member.blocked} ? 'bi bi-unlock' : 'bi bi-lock'"></i>
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    title="Delete"
                                    data-bs-toggle="modal" data-bs-target="#deleteModal"
                                    th:attr="data-delete-url=@{/admin/members/{id}/delete(id=${member.id})},
                                             data-item-name=${member.fullName}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Pagination -->
    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center" th:if="${members.totalPages > 1}">
        <small class="text-muted">
            Page <span th:text="${currentPage + 1}"></span> of <span th:text="${members.totalPages}"></span>
        </small>
        <nav>
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/members(search=${search},page=${currentPage - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, members.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/members(search=${search},page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == members.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/members(search=${search},page=${currentPage + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete member <strong id="deleteItemName"></strong>?
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a href="#" id="deleteConfirmBtn" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</a>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
