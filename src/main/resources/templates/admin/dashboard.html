<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout('Admin Dashboard', ~{::main})}">
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Admin Dashboard</h4>
    <div>
        <a th:href="@{/admin/books/new}" class="btn btn-primary btn-sm me-2">
            <i class="bi bi-plus-circle me-1"></i>Add Book
        </a>
        <a th:href="@{/admin/issue-book}" class="btn btn-success btn-sm">
            <i class="bi bi-arrow-up-circle me-1"></i>Issue Book
        </a>
    </div>
</div>

<!-- Statistics Cards -->
<div class="row g-4 mb-4">
    <div class="col-sm-6 col-xl-2-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary-subtle rounded-3 p-3">
                    <i class="bi bi-journals fs-3 text-primary"></i>
                </div>
                <div>
                    <div class="fs-2 fw-bold text-primary" th:text="${totalBooks}">0</div>
                    <div class="text-muted small">Total Books</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-2-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-success-subtle rounded-3 p-3">
                    <i class="bi bi-people-fill fs-3 text-success"></i>
                </div>
                <div>
                    <div class="fs-2 fw-bold text-success" th:text="${totalMembers}">0</div>
                    <div class="text-muted small">Total Members</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-2-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-info-subtle rounded-3 p-3">
                    <i class="bi bi-arrow-up-circle fs-3 text-info"></i>
                </div>
                <div>
                    <div class="fs-2 fw-bold text-info" th:text="${issuedToday}">0</div>
                    <div class="text-muted small">Issued Today</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-2-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning-subtle rounded-3 p-3">
                    <i class="bi bi-clock-history fs-3 text-warning"></i>
                </div>
                <div>
                    <div class="fs-2 fw-bold text-warning" th:text="${overdueBooks}">0</div>
                    <div class="text-muted small">Overdue Books</div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-2-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-danger-subtle rounded-3 p-3">
                    <i class="bi bi-currency-rupee fs-3 text-danger"></i>
                </div>
                <div>
                    <div class="fs-2 fw-bold text-danger">
                        ₹<span th:text="${#numbers.formatDecimal(fineCollected, 1, 2)}">0.00</span>
                    </div>
                    <div class="text-muted small">Fine Collected</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Recent Transactions -->
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
        <h6 class="fw-semibold mb-0"><i class="bi bi-clock-history me-2 text-primary"></i>Recent Transactions</h6>
        <a th:href="@{/admin/transactions}" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Member</th>
                        <th>Book</th>
                        <th>Issue Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Fine</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(recentTransactions)}">
                        <td colspan="7" class="text-center text-muted py-4">No transactions yet.</td>
                    </tr>
                    <tr th:each="t : ${recentTransactions}">
                        <td class="ps-3 text-muted small" th:text="${t.id}"></td>
                        <td th:text="${t.user.fullName}"></td>
                        <td th:text="${t.book.title}"></td>
                        <td th:text="${t.issueDate}"></td>
                        <td th:text="${t.dueDate}"></td>
                        <td>
                            <span th:switch="${t.status.name()}">
                                <span th:case="'ISSUED'" class="badge bg-primary">Issued</span>
                                <span th:case="'RETURNED'" class="badge bg-success">Returned</span>
                                <span th:case="'OVERDUE'" class="badge bg-danger">Overdue</span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${t.fineAmount > 0}" class="text-danger fw-medium">
                                ₹<span th:text="${#numbers.formatDecimal(t.fineAmount, 1, 2)}"></span>
                            </span>
                            <span th:if="${t.fineAmount == 0}" class="text-muted">—</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>
</body>
</html>
